name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Playwright tests in Docker
      run: |
        # Собираем ваш образ
        docker build -t diploma-tests .
        # Запускаем тесты (используем headless режим и xvfb)
        docker run --rm diploma-tests xvfb-run pytest -v -p no:xdist
